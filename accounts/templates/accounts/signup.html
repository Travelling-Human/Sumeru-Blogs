{% extends 'base.html' %}
{% block title %}Sign Up | Sumeru Blog{% endblock %}
{% block content %}
  <h2 style="text-align:center;">Join the Sumeru Network</h2>

  {% if error %}
    <p style="color:#ffb3b3; text-align:center;">{{ error }}</p>
  {% endif %}

  <form method="post" style="max-width:400px; margin:auto;">
    <input type="text" name="username" placeholder="Username" required
           style="width:100%; padding:10px; margin:8px 0; border-radius:8px; border:none;">
    <input type="email" name="email" placeholder="Email" required
           style="width:100%; padding:10px; margin:8px 0; border-radius:8px; border:none;">
    <input type="password" name="password" placeholder="Password" required
           style="width:100%; padding:10px; margin:8px 0; border-radius:8px; border:none;">
    <input type="password" name="confirm" placeholder="Confirm Password" required
           style="width:100%; padding:10px; margin:8px 0; border-radius:8px; border:none;">

    <button type="submit" style="width:100%; padding:10px; border:none; border-radius:8px;
      background:#a7c957; color:#1c2a2e; font-weight:bold;">Sign Up</button>
  </form>

  <p style="text-align:center; margin-top:10px;">
    Already have an account? <a href="{% url 'login' %}" style="color:#d3ffb5;">Login</a>
  </p>
{% endblock %}
